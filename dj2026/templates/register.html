{% extends 'base.html' %}
{% load static %}

{% block title %}用户注册{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="auth-card">
        <h2 class="auth-title">用户注册</h2>

        {% if messages %}
        <div class="messages-container">
            {% for message in messages %}
            <div class="message {{ message.tags }}">
                {{ message }}
            </div>
            {% endfor %}
        </div>
        {% endif %}

        <form method="post" class="auth-form">
            {% csrf_token %}

            <div class="form-group">
                <label for="id_username">用户名:</label>
                <input type="text" name="username" id="id_username"
                       class="form-input" required>
            </div>

            <div class="form-group">
                <label for="id_phone">手机号:</label>
                <input type="tel" name="phone" id="id_phone"
                       class="form-input" required>
            </div>

            <div class="form-group">
                <label for="id_reading_hobbies">阅读爱好:</label>
                <input type="text" name="reading_hobbies" id="id_reading_hobbies"
                       class="form-input" placeholder="例如：科普,文学,工程技术" required>
                <small class="form-help">请输入您的阅读爱好，多个爱好用逗号分隔</small>
            </div>

            <div class="form-group">
                <label for="id_password1">密码:</label>
                <input type="password" name="password1" id="id_password1"
                       class="form-input" required>
            </div>

            <div class="form-group">
                <label for="id_password2">确认密码:</label>
                <input type="password" name="password2" id="id_password2"
                       class="form-input" required>
            </div>

            <button type="submit" class="btn btn-success btn-auth">注册</button>
        </form>

        <div class="auth-footer">
            <p>已有账号？ <a href="{% url 'user_login' %}">立即登录</a></p>
        </div>
    </div>
</div>
{% endblock %}
